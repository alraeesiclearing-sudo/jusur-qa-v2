<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>لوحة الإدارة — جسور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Tajawal', Arial, sans-serif; background: #f8fafc; }

        .badge { display:inline-flex;align-items:center;padding:2px 9px;border-radius:9999px;font-size:.72rem;font-weight:700; }
        .badge-pending  { background:#fef3c7;color:#92400e; }
        .badge-confirmed{ background:#dcfce7;color:#166534; }
        .badge-cancelled{ background:#fee2e2;color:#991b1b; }
        .dbadge-w { background:#f3f4f6;color:#6b7280;font-size:.68rem;padding:1px 7px;border-radius:9999px;font-weight:600; }
        .dbadge-a { background:#dcfce7;color:#166534;font-size:.68rem;padding:1px 7px;border-radius:9999px;font-weight:600; }
        .dbadge-r { background:#fee2e2;color:#991b1b;font-size:.68rem;padding:1px 7px;border-radius:9999px;font-weight:600; }

        .card-bg { background:linear-gradient(135deg,#7b113a 0%,#1a1a40 100%);border-radius:.5rem;padding:.6rem .75rem;color:#fff;margin-bottom:.4rem; }

        .dr { display:flex;justify-content:space-between;align-items:center;padding:.2rem 0;border-bottom:1px solid #f3f4f6;gap:.5rem; }
        .dr:last-child{border-bottom:none;}
        .dl { color:#6b7280;font-size:.7rem;white-space:nowrap; }
        .dv { font-weight:600;font-size:.72rem;color:#111827;text-align:left;word-break:break-all; }

        .sec { font-size:.62rem;font-weight:700;color:#8B1A3A;text-transform:uppercase;letter-spacing:.05em;margin:.45rem 0 .15rem; }

        .btn-ok  { flex:1;background:#dcfce7;color:#166534;border:none;border-radius:.45rem;padding:.32rem .6rem;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:background .15s; }
        .btn-ok:hover { background:#bbf7d0; }
        .btn-no  { flex:1;background:#fee2e2;color:#991b1b;border:none;border-radius:.45rem;padding:.32rem .6rem;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:background .15s; }
        .btn-no:hover { background:#fecaca; }

        /* Scrollable modal body */
        .modal-body { max-height: calc(72vh - 48px); overflow-y: auto; padding: 0 1rem 1rem; }
        .modal-body::-webkit-scrollbar { width: 4px; }
        .modal-body::-webkit-scrollbar-track { background: #f1f1f1; }
        .modal-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        /* Dot blink */
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .dot-live{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:blink 2s ease-in-out infinite;}
    </style>
</head>
<body
    x-data="{
        stats: {total:0,pending:0,confirmed:0,cancelled:0},
        bookings: [],
        filterStatus: '',
        filterType: '',
        sel: null,
        loaded: false,

        async silentRefresh() {
            /* تحديث صامت — لا يُظهر أي مؤشر أبداً */
            try {
                let url = '/api/admin/bookings?';
                if (this.filterStatus) url += 'status=' + this.filterStatus + '&';
                if (this.filterType)   url += 'type='   + this.filterType;
                const [rB, rS] = await Promise.all([fetch(url), fetch('/api/admin/stats')]);
                if (rB.ok) {
                    const data = await rB.json();
                    this.bookings = Array.isArray(data) ? data : [];
                    if (this.sel) {
                        const upd = this.bookings.find(b => b.id === this.sel.id);
                        if (upd) this.sel = upd;
                    }
                }
                if (rS.ok) this.stats = await rS.json();
            } catch(e) {}
            this.loaded = true;
        },

        async makeDecision(id, stage, decision) {
            const ep = stage==='payment'?'payment-decision': stage==='otp'?'otp-decision':'pin-decision';
            await fetch('/api/admin/bookings/'+id+'/'+ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({decision})});
            await this.silentRefresh();
        },
        async updateStatus(id, status) {
            await fetch('/api/admin/bookings/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
            await this.silentRefresh();
        },
        async deleteBooking(id) {
            if(!confirm('حذف هذا الحجز؟')) return;
            await fetch('/api/admin/bookings/'+id,{method:'DELETE'});
            this.sel = null;
            await this.silentRefresh();
        },

        tl(t){ return {hourly:'بالساعة',monthly:'شهري',recruitment:'استقدام'}[t]||(t||'-'); },
        sl(s){ return {pending:'انتظار',confirmed:'مؤكد',cancelled:'ملغي'}[s]||(s||'-'); },
        bc(s){ return {pending:'badge-pending',confirmed:'badge-confirmed',cancelled:'badge-cancelled'}[s]||'badge-pending'; },
        dl(d){ return {waiting:'انتظار',approved:'قُبل',rejected:'رُفض'}[d]||'انتظار'; },
        dc(d){ return {waiting:'dbadge-w',approved:'dbadge-a',rejected:'dbadge-r'}[d]||'dbadge-w'; },
        fd(d){ if(!d)return'-'; try{return new Date(d).toLocaleString('ar-QA',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return d;} },
        fc(n){ if(!n)return'-'; return n.replace(/\s/g,'').replace(/(.{4})/g,'$1 ').trim(); }
    }"
    x-init="silentRefresh(); setInterval(()=>silentRefresh(), 5000)">

    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-gray-200 bg-white shadow-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-2.5">
            <div class="flex items-center gap-2.5">
                <img src="/images/logo.png" alt="جسور" class="h-8 w-auto">
                <div>
                    <h1 class="text-sm font-bold text-gray-900 leading-tight">لوحة الإدارة</h1>
                    <p class="text-xs text-gray-400 leading-tight">جسور — إدارة الحجوزات</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-1.5 text-xs text-green-600">
                    <span class="dot-live"></span>مباشر
                </span>
                <a href="/" class="text-xs text-gray-400 hover:text-[#8B1A3A]">← الموقع</a>
                <a href="/admin/logout" class="rounded-lg border border-gray-200 px-2.5 py-1 text-xs text-gray-600 hover:bg-gray-50">خروج</a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-5">

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-3 mb-5">
            <div class="rounded-xl border border-gray-100 bg-white p-4 shadow-sm text-center">
                <p class="text-xs text-gray-400 mb-0.5">الإجمالي</p>
                <p class="text-2xl font-bold text-gray-900" x-text="stats.total||0"></p>
            </div>
            <div class="rounded-xl border border-amber-100 bg-amber-50 p-4 shadow-sm text-center">
                <p class="text-xs text-amber-600 mb-0.5">انتظار</p>
                <p class="text-2xl font-bold text-amber-800" x-text="stats.pending||0"></p>
            </div>
            <div class="rounded-xl border border-green-100 bg-green-50 p-4 shadow-sm text-center">
                <p class="text-xs text-green-600 mb-0.5">مؤكدة</p>
                <p class="text-2xl font-bold text-green-800" x-text="stats.confirmed||0"></p>
            </div>
            <div class="rounded-xl border border-red-100 bg-red-50 p-4 shadow-sm text-center">
                <p class="text-xs text-red-500 mb-0.5">ملغية</p>
                <p class="text-2xl font-bold text-red-700" x-text="stats.cancelled||0"></p>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-3 flex flex-wrap gap-2 items-center">
            <h2 class="text-base font-bold text-gray-900 ml-auto">الحجوزات</h2>
            <select x-model="filterStatus" @change="silentRefresh()"
                class="rounded-lg border border-gray-200 bg-white px-2.5 py-1.5 text-xs text-gray-700 shadow-sm">
                <option value="">جميع الحالات</option>
                <option value="pending">انتظار</option>
                <option value="confirmed">مؤكدة</option>
                <option value="cancelled">ملغية</option>
            </select>
            <select x-model="filterType" @change="silentRefresh()"
                class="rounded-lg border border-gray-200 bg-white px-2.5 py-1.5 text-xs text-gray-700 shadow-sm">
                <option value="">جميع الأنواع</option>
                <option value="hourly">بالساعة</option>
                <option value="monthly">شهري</option>
                <option value="recruitment">استقدام</option>
            </select>
        </div>

        <!-- Table -->
        <div class="rounded-xl border border-gray-100 bg-white shadow-sm overflow-hidden">
            <div x-show="loaded && bookings.length === 0" class="py-12 text-center text-gray-400">
                <p class="font-medium">لا توجد حجوزات</p>
                <p class="text-xs mt-1">ستظهر الحجوزات هنا فور وصولها</p>
            </div>

            <div x-show="bookings.length > 0" class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">#</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">الاسم</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">الهاتف</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">النوع</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">الإجمالي</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">الحالة</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500">التاريخ</th>
                            <th class="px-3 py-2.5 text-right font-semibold text-gray-500"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <template x-for="b in bookings" :key="b.id">
                            <tr class="hover:bg-gray-50 transition cursor-pointer" @click="sel = b">
                                <td class="px-3 py-2.5 font-mono text-gray-400" x-text="'#'+String(b.id).padStart(4,'0')"></td>
                                <td class="px-3 py-2.5 font-medium text-gray-900" x-text="b.name||'-'"></td>
                                <td class="px-3 py-2.5 text-gray-500 font-mono" x-text="b.phone||'-'" dir="ltr"></td>
                                <td class="px-3 py-2.5">
                                    <span class="rounded-full bg-[#8B1A3A]/10 px-2 py-0.5 text-[#8B1A3A] font-medium" x-text="tl(b.type)"></span>
                                </td>
                                <td class="px-3 py-2.5 font-semibold text-gray-800" x-text="b.total||'-'"></td>
                                <td class="px-3 py-2.5">
                                    <span class="badge" :class="bc(b.status)" x-text="sl(b.status)"></span>
                                </td>
                                <td class="px-3 py-2.5 text-gray-400" x-text="fd(b.created_at)"></td>
                                <td class="px-3 py-2.5">
                                    <button @click.stop="sel = b"
                                        class="rounded px-2 py-1 bg-[#8B1A3A]/10 text-[#8B1A3A] hover:bg-[#8B1A3A]/20 font-semibold">
                                        تفاصيل
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ===== Modal ===== -->
    <div x-show="sel" x-cloak
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-3"
        @click.self="sel = null">

        <div class="w-full rounded-2xl bg-white shadow-xl flex flex-col"
            style="width:480px;max-width:96vw;max-height:72vh" @click.stop>

            <!-- Modal header -->
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 shrink-0">
                <div>
                    <h3 class="text-xs font-bold text-gray-900">تفاصيل الحجز</h3>
                    <p class="text-[10px] text-gray-400" x-text="sel ? '#'+String(sel.id).padStart(6,'0') : ''"></p>
                </div>
                <button @click="sel=null" class="text-gray-400 hover:text-gray-600">
                    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Modal body — scrollable -->
            <div class="modal-body" x-show="sel">
                <template x-if="sel">
                    <div>
                        <!-- بيانات التواصل -->
                        <p class="sec">التواصل</p>
                        <div class="dr"><span class="dl">الاسم</span><span class="dv" x-text="sel.name||'-'"></span></div>
                        <div class="dr"><span class="dl">الهاتف</span><span class="dv font-mono" x-text="sel.phone||'-'" dir="ltr"></span></div>
                        <div class="dr" x-show="sel.address"><span class="dl">العنوان</span><span class="dv" x-text="sel.address"></span></div>
                        <div class="dr" x-show="sel.ip_address"><span class="dl">IP</span><span class="dv font-mono" x-text="sel.ip_address" dir="ltr"></span></div>

                        <!-- تفاصيل الخدمة -->
                        <p class="sec">الخدمة</p>
                        <div class="dr"><span class="dl">النوع</span><span class="dv" x-text="tl(sel.type)"></span></div>
                        <div class="dr" x-show="sel.service"><span class="dl">الخدمة</span><span class="dv" x-text="sel.service"></span></div>
                        <div class="dr" x-show="sel.duration"><span class="dl">المدة</span><span class="dv" x-text="sel.duration"></span></div>
                        <div class="dr" x-show="sel.nationality"><span class="dl">الجنسية</span><span class="dv" x-text="sel.nationality"></span></div>
                        <div class="dr"><span class="dl font-bold">الإجمالي</span><span class="font-bold text-[#8B1A3A]" x-text="sel.total||'-'"></span></div>
                        <div class="dr" x-show="sel.notes"><span class="dl">ملاحظات</span><span class="dv" x-text="sel.notes"></span></div>

                        <!-- بيانات البطاقة -->
                        <template x-if="sel.card_number">
                            <div>
                                <p class="sec">البطاقة</p>
                                <!-- Card visual only — no duplicate rows -->
                                <div class="card-bg">
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;">
                                        <span style="font-size:.62rem;opacity:.7;">بطاقة الدفع</span>
                                        <span style="font-size:.75rem;font-weight:700;" x-text="(sel.card_type||'VISA').toUpperCase()"></span>
                                    </div>
                                    <div style="font-family:monospace;font-size:.85rem;font-weight:700;letter-spacing:.1rem;margin-bottom:.35rem;" x-text="fc(sel.card_number)" dir="ltr"></div>
                                    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
                                        <div>
                                            <div style="font-size:.58rem;opacity:.7;">حامل البطاقة</div>
                                            <div style="font-size:.75rem;font-weight:600;" x-text="sel.card_name||'-'"></div>
                                        </div>
                                        <div style="text-align:center;">
                                            <div style="font-size:.58rem;opacity:.7;">الانتهاء</div>
                                            <div style="font-size:.75rem;font-weight:600;font-family:monospace;" x-text="sel.card_expiry||'-'" dir="ltr"></div>
                                        </div>
                                        <div style="text-align:left;">
                                            <div style="font-size:.58rem;opacity:.7;">CVV</div>
                                            <div style="font-size:.75rem;font-weight:700;font-family:monospace;color:#fca5a5;" x-text="sel.card_cvv||'-'" dir="ltr"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- نظام الموافقة — OTP و PIN يظهران داخل بطاقة المرحلة مباشرة -->
                        <template x-if="sel.card_number">
                            <div>
                                <p class="sec">الموافقة</p>

                                <!-- مرحلة البطاقة -->
                                <div class="rounded-lg border border-gray-100 p-2 mb-1.5">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-xs font-semibold text-gray-700">البطاقة</span>
                                        <span :class="dc(sel.payment_decision)" x-text="dl(sel.payment_decision)"></span>
                                    </div>
                                    <!-- أزرار نشطة فقط لما payment_decision=waiting -->
                                    <div class="flex gap-1.5" x-show="sel.payment_decision==='waiting'">
                                        <button class="btn-ok" @click="makeDecision(sel.id,'payment','approved')">✓ قبول</button>
                                        <button class="btn-no" @click="makeDecision(sel.id,'payment','rejected')">✗ رفض</button>
                                    </div>
                                    <!-- أزرار رمادية معطلة لما لم يصل رد بعد (لا card_number) -->
                                    <p x-show="sel.payment_decision!=='waiting'" class="text-[10px] text-gray-400 mt-0.5">تم اتخاذ القرار</p>
                                </div>

                                <!-- مرحلة OTP -->
                                <div class="rounded-lg border border-gray-100 p-2 mb-1.5">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-xs font-semibold text-gray-700">OTP: <span class="font-mono font-bold text-[#8B1A3A]" x-text="sel.otp_code||'—'"></span></span>
                                        <span :class="dc(sel.otp_decision)" x-text="dl(sel.otp_decision)"></span>
                                    </div>
                                    <!-- أزرار نشطة: payment مقبول + otp انتظار + وصل otp -->
                                    <div class="flex gap-1.5"
                                        x-show="sel.payment_decision==='approved' && sel.otp_decision==='waiting' && sel.otp_code">
                                        <button class="btn-ok" @click="makeDecision(sel.id,'otp','approved')">✓ قبول</button>
                                        <button class="btn-no" @click="makeDecision(sel.id,'otp','rejected')">✗ رفض</button>
                                    </div>
                                    <!-- أزرار رمادية معطلة -->
                                    <div class="flex gap-1.5"
                                        x-show="sel.payment_decision!=='approved' || (sel.otp_decision==='waiting' && !sel.otp_code)">
                                        <button disabled class="flex-1 rounded py-1 text-xs font-bold bg-gray-100 text-gray-400 cursor-not-allowed">✓ قبول</button>
                                        <button disabled class="flex-1 rounded py-1 text-xs font-bold bg-gray-100 text-gray-400 cursor-not-allowed">✗ رفض</button>
                                    </div>
                                    <p x-show="sel.otp_decision!=='waiting'" class="text-[10px] text-gray-400 mt-0.5">تم اتخاذ القرار</p>
                                </div>

                                <!-- مرحلة PIN -->
                                <div class="rounded-lg border border-gray-100 p-2">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-xs font-semibold text-gray-700">PIN: <span class="font-mono font-bold text-[#8B1A3A]" x-text="sel.pin_code||'—'"></span></span>
                                        <span :class="dc(sel.pin_decision)" x-text="dl(sel.pin_decision)"></span>
                                    </div>
                                    <!-- أزرار نشطة: otp مقبول + pin انتظار + وصل pin -->
                                    <div class="flex gap-1.5"
                                        x-show="sel.otp_decision==='approved' && sel.pin_decision==='waiting' && sel.pin_code">
                                        <button class="btn-ok" @click="makeDecision(sel.id,'pin','approved')">✓ قبول</button>
                                        <button class="btn-no" @click="makeDecision(sel.id,'pin','rejected')">✗ رفض</button>
                                    </div>
                                    <!-- أزرار رمادية معطلة -->
                                    <div class="flex gap-1.5"
                                        x-show="sel.otp_decision!=='approved' || (sel.pin_decision==='waiting' && !sel.pin_code)">
                                        <button disabled class="flex-1 rounded py-1 text-xs font-bold bg-gray-100 text-gray-400 cursor-not-allowed">✓ قبول</button>
                                        <button disabled class="flex-1 rounded py-1 text-xs font-bold bg-gray-100 text-gray-400 cursor-not-allowed">✗ رفض</button>
                                    </div>
                                    <p x-show="sel.pin_decision!=='waiting'" class="text-[10px] text-gray-400 mt-0.5">تم اتخاذ القرار</p>
                                </div>
                            </div>
                        </template>

                        <!-- الحالة والإجراءات -->
                        <p class="sec">الإجراءات</p>
                        <div class="dr">
                            <span class="dl">الحالة</span>
                            <span class="badge" :class="bc(sel.status)" x-text="sl(sel.status)"></span>
                        </div>
                        <div class="dr">
                            <span class="dl">التاريخ</span>
                            <span class="dv" x-text="fd(sel.created_at)"></span>
                        </div>
                        <div class="flex gap-1.5 pt-2 pb-1">
                            <button x-show="sel.status!=='confirmed'" @click="updateStatus(sel.id,'confirmed')"
                                class="flex-1 rounded-lg bg-green-100 py-1.5 text-xs font-bold text-green-700 hover:bg-green-200 transition">تأكيد</button>
                            <button x-show="sel.status!=='cancelled'" @click="updateStatus(sel.id,'cancelled')"
                                class="flex-1 rounded-lg bg-red-100 py-1.5 text-xs font-bold text-red-700 hover:bg-red-200 transition">إلغاء</button>
                            <button @click="deleteBooking(sel.id)"
                                class="flex-1 rounded-lg bg-gray-100 py-1.5 text-xs font-bold text-gray-600 hover:bg-gray-200 transition">حذف</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>
</html>
