<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>لوحة الإدارة — جسور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'Arial', 'sans-serif'] },
                    colors: { brand: { DEFAULT: '#8B1A3A', dark: '#6B1230' } },
                },
            },
        };
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-confirmed { background: #dcfce7; color: #166534; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 font-sans antialiased"
    x-data="{
        stats: {},
        bookings: [],
        filterStatus: '',
        filterType: '',
        selectedBooking: null,
        loading: true,
        async loadStats() {
            const r = await fetch('/api/admin/stats');
            this.stats = await r.json();
        },
        async loadBookings() {
            this.loading = true;
            let url = '/api/admin/bookings?';
            if (this.filterStatus) url += 'status=' + this.filterStatus + '&';
            if (this.filterType) url += 'type=' + this.filterType;
            const r = await fetch(url);
            this.bookings = await r.json();
            this.loading = false;
        },
        async updateStatus(id, status) {
            await fetch('/api/admin/bookings/' + id, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            await this.loadBookings();
            await this.loadStats();
            if (this.selectedBooking && this.selectedBooking.id === id) {
                this.selectedBooking.status = status;
            }
        },
        async deleteBooking(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الحجز؟')) return;
            await fetch('/api/admin/bookings/' + id, { method: 'DELETE' });
            this.selectedBooking = null;
            await this.loadBookings();
            await this.loadStats();
        },
        typeLabel(t) {
            return { hourly: 'بالساعة', monthly: 'شهري', recruitment: 'استقدام' }[t] || t;
        },
        statusLabel(s) {
            return { pending: 'قيد الانتظار', confirmed: 'مؤكد', cancelled: 'ملغي' }[s] || s;
        },
        badgeClass(s) {
            return { pending: 'badge-pending', confirmed: 'badge-confirmed', cancelled: 'badge-cancelled' }[s] || 'badge-pending';
        },
        formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('ar-QA', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    }"
    x-init="loadStats(); loadBookings()">

    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-gray-200 bg-white shadow-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <img src="/images/logo.png" alt="جسور" class="h-9 w-auto">
                <div>
                    <h1 class="text-base font-bold text-gray-900">لوحة الإدارة</h1>
                    <p class="text-xs text-gray-500">إدارة الحجوزات</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <a href="/" class="text-sm text-gray-500 hover:text-[#8B1A3A] transition">← الموقع</a>
                <a href="/admin/logout" class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-50 transition">خروج</a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8">

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 gap-4 mb-8 sm:grid-cols-4">
            <div class="rounded-xl border border-gray-100 bg-white p-5 shadow-sm">
                <p class="text-xs text-gray-500 mb-1">إجمالي الحجوزات</p>
                <p class="text-3xl font-bold text-gray-900" x-text="stats.total || 0"></p>
            </div>
            <div class="rounded-xl border border-amber-100 bg-amber-50 p-5 shadow-sm">
                <p class="text-xs text-amber-700 mb-1">قيد الانتظار</p>
                <p class="text-3xl font-bold text-amber-800" x-text="stats.pending || 0"></p>
            </div>
            <div class="rounded-xl border border-green-100 bg-green-50 p-5 shadow-sm">
                <p class="text-xs text-green-700 mb-1">مؤكدة</p>
                <p class="text-3xl font-bold text-green-800" x-text="stats.confirmed || 0"></p>
            </div>
            <div class="rounded-xl border border-red-100 bg-red-50 p-5 shadow-sm">
                <p class="text-xs text-red-700 mb-1">ملغية</p>
                <p class="text-3xl font-bold text-red-800" x-text="stats.cancelled || 0"></p>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-5 flex flex-wrap gap-3 items-center">
            <h2 class="text-lg font-bold text-gray-900 ml-auto">الحجوزات</h2>
            <select x-model="filterStatus" @change="loadBookings()"
                class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 shadow-sm">
                <option value="">جميع الحالات</option>
                <option value="pending">قيد الانتظار</option>
                <option value="confirmed">مؤكدة</option>
                <option value="cancelled">ملغية</option>
            </select>
            <select x-model="filterType" @change="loadBookings()"
                class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 shadow-sm">
                <option value="">جميع الأنواع</option>
                <option value="hourly">بالساعة</option>
                <option value="monthly">شهري</option>
                <option value="recruitment">استقدام</option>
            </select>
            <button @click="loadBookings()" class="rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 transition shadow-sm">
                تحديث
            </button>
        </div>

        <!-- Table -->
        <div class="rounded-xl border border-gray-100 bg-white shadow-sm overflow-hidden">
            <div x-show="loading" class="py-16 text-center text-gray-400">
                <p>جاري التحميل...</p>
            </div>
            <div x-show="!loading && bookings.length === 0" class="py-16 text-center text-gray-400">
                <p class="text-lg">لا توجد حجوزات</p>
            </div>
            <div x-show="!loading && bookings.length > 0" class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">#</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">الاسم</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">الهاتف</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">النوع</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">الإجمالي</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">الحالة</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">التاريخ</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <template x-for="b in bookings" :key="b.id">
                            <tr class="hover:bg-gray-50 transition cursor-pointer" @click="selectedBooking = b">
                                <td class="px-4 py-3 font-mono text-gray-500" x-text="'#' + String(b.id).padStart(4,'0')"></td>
                                <td class="px-4 py-3 font-medium text-gray-900" x-text="b.name || '-'"></td>
                                <td class="px-4 py-3 text-gray-600 font-mono" x-text="b.phone || '-'" dir="ltr"></td>
                                <td class="px-4 py-3">
                                    <span class="rounded-full bg-[#8B1A3A]/10 px-2 py-0.5 text-xs font-medium text-[#8B1A3A]" x-text="typeLabel(b.type)"></span>
                                </td>
                                <td class="px-4 py-3 font-semibold text-gray-900" x-text="b.total || '-'"></td>
                                <td class="px-4 py-3">
                                    <span class="status-badge" :class="badgeClass(b.status)" x-text="statusLabel(b.status)"></span>
                                </td>
                                <td class="px-4 py-3 text-gray-500 text-xs" x-text="formatDate(b.created_at)"></td>
                                <td class="px-4 py-3">
                                    <div class="flex gap-1" @click.stop>
                                        <button x-show="b.status !== 'confirmed'" @click="updateStatus(b.id, 'confirmed')"
                                            class="rounded px-2 py-1 text-xs bg-green-100 text-green-700 hover:bg-green-200 transition">تأكيد</button>
                                        <button x-show="b.status !== 'cancelled'" @click="updateStatus(b.id, 'cancelled')"
                                            class="rounded px-2 py-1 text-xs bg-red-100 text-red-700 hover:bg-red-200 transition">إلغاء</button>
                                        <button @click="deleteBooking(b.id)"
                                            class="rounded px-2 py-1 text-xs bg-gray-100 text-gray-600 hover:bg-gray-200 transition">حذف</button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Booking Detail Modal -->
        <div x-show="selectedBooking" x-cloak
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
            @click.self="selectedBooking = null">
            <div class="w-full max-w-md rounded-2xl bg-white shadow-xl p-6" @click.stop>
                <div class="flex items-center justify-between mb-5">
                    <h3 class="text-lg font-bold text-gray-900">تفاصيل الحجز</h3>
                    <button @click="selectedBooking = null" class="text-gray-400 hover:text-gray-600">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <template x-if="selectedBooking">
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-500">رقم الحجز</span>
                            <span class="font-mono font-bold text-[#8B1A3A]" x-text="'#' + String(selectedBooking.id).padStart(6,'0')"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">الاسم</span>
                            <span class="font-medium" x-text="selectedBooking.name || '-'"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">الهاتف</span>
                            <span class="font-mono" x-text="selectedBooking.phone || '-'" dir="ltr"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">العنوان</span>
                            <span class="font-medium text-left max-w-48" x-text="selectedBooking.address || '-'"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">نوع الخدمة</span>
                            <span class="font-medium" x-text="typeLabel(selectedBooking.type)"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.service">
                            <span class="text-gray-500">الخدمة</span>
                            <span class="font-medium" x-text="selectedBooking.service"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.duration">
                            <span class="text-gray-500">المدة</span>
                            <span class="font-medium" x-text="selectedBooking.duration"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.nationality">
                            <span class="text-gray-500">الجنسية</span>
                            <span class="font-medium" x-text="selectedBooking.nationality"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.start_date">
                            <span class="text-gray-500">تاريخ البدء</span>
                            <span class="font-medium" x-text="selectedBooking.start_date"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.card_last4">
                            <span class="text-gray-500">البطاقة</span>
                            <span class="font-mono" x-text="(selectedBooking.card_type || '').toUpperCase() + ' •••• ' + selectedBooking.card_last4" dir="ltr"></span>
                        </div>
                        <div class="flex justify-between" x-show="selectedBooking.notes">
                            <span class="text-gray-500">ملاحظات</span>
                            <span class="font-medium text-left max-w-48" x-text="selectedBooking.notes"></span>
                        </div>
                        <div class="border-t border-gray-100 pt-3 flex justify-between">
                            <span class="font-semibold text-gray-800">الإجمالي</span>
                            <span class="font-bold text-[#8B1A3A] text-lg" x-text="selectedBooking.total || '-'"></span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-500">الحالة</span>
                            <span class="status-badge" :class="badgeClass(selectedBooking.status)" x-text="statusLabel(selectedBooking.status)"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">التاريخ</span>
                            <span class="text-xs text-gray-600" x-text="formatDate(selectedBooking.created_at)"></span>
                        </div>
                        <!-- Actions -->
                        <div class="flex gap-2 pt-3 border-t border-gray-100">
                            <button x-show="selectedBooking.status !== 'confirmed'" @click="updateStatus(selectedBooking.id, 'confirmed')"
                                class="flex-1 rounded-lg bg-green-100 py-2 text-sm font-semibold text-green-700 hover:bg-green-200 transition">تأكيد</button>
                            <button x-show="selectedBooking.status !== 'cancelled'" @click="updateStatus(selectedBooking.id, 'cancelled')"
                                class="flex-1 rounded-lg bg-red-100 py-2 text-sm font-semibold text-red-700 hover:bg-red-200 transition">إلغاء</button>
                            <button @click="deleteBooking(selectedBooking.id)"
                                class="flex-1 rounded-lg bg-gray-100 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-200 transition">حذف</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>
</html>
